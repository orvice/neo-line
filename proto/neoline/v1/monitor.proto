syntax = "proto3";

package neoline.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/orvice/neo-line/pkg/proto/neoline/v1;neolinev1";

// CertificateInfo captures peer certificate metadata observed during a probe.
message CertificateInfo {
  string subject = 1;
  string issuer = 2;
  repeated string dns_names = 3;
  string serial_number = 4;
  google.protobuf.Timestamp not_before = 5;
  google.protobuf.Timestamp not_after = 6;
  int32 days_remaining = 7;
}

// Monitor describes a single configured check attached to a server.
message Monitor {
  string id = 1;
  string server_id = 2;
  repeated string group_ids = 3;
  string name = 4;
  // kind is one of "tcp", "url", "tls_port".
  string kind = 5;
  bool enabled = 6;
  string host = 7;
  uint32 port = 8;
  string url = 9;
  string method = 10;
  string path = 11;
  map<string, string> headers = 12;
  string expected_status_codes = 13;
  bool tls_verify = 14;
  string sni_name = 15;
  uint32 warning_days = 16;
  uint32 critical_days = 17;
  uint32 interval_seconds = 18;
  uint32 timeout_seconds = 19;
  uint32 retries = 20;
  string status = 21;
  google.protobuf.Timestamp last_check_at = 22;
  google.protobuf.Timestamp last_status_change_at = 23;
  CertificateInfo certificate = 24;
  google.protobuf.Timestamp created_at = 25;
  google.protobuf.Timestamp updated_at = 26;
}

// CheckResult is the outcome of a single monitor execution.
message CheckResult {
  string id = 1;
  string server_id = 2;
  string monitor_id = 3;
  string status = 4;
  google.protobuf.Timestamp started_at = 5;
  google.protobuf.Timestamp ended_at = 6;
  int64 duration_ms = 7;
  string error_stage = 8;
  string error_message = 9;
  string remote_address = 10;
  uint32 port = 11;
  uint32 http_status_code = 12;
  CertificateInfo certificate = 13;
}

// UptimeWindow summarizes availability over a single rolling time window.
message UptimeWindow {
  int64 window_seconds = 1;
  int32 total = 2;
  int32 up = 3;
  int32 down = 4;
  double uptime = 5;
  double avg_latency_ms = 6;
}

// Heartbeat is a compact view of one check, ordered oldest to newest.
message Heartbeat {
  string status = 1;
  google.protobuf.Timestamp started_at = 2;
  int64 duration_ms = 3;
}

// MonitorUptime is the Kuma-style availability summary for one monitor.
message MonitorUptime {
  map<string, UptimeWindow> windows = 1;
  repeated Heartbeat heartbeats = 2;
}

message ListMonitorsRequest {
  string server_id = 1;
  uint32 page_size = 2;
  string page_token = 3;
}

message ListMonitorsResponse {
  repeated Monitor monitors = 1;
  string next_page_token = 2;
}

message CreateMonitorRequest {
  string server_id = 1;
  Monitor monitor = 2;
}

message CreateMonitorResponse {
  Monitor monitor = 1;
}

message GetMonitorRequest {
  string server_id = 1;
  string monitor_id = 2;
}

message GetMonitorResponse {
  Monitor monitor = 1;
}

message UpdateMonitorRequest {
  string server_id = 1;
  string monitor_id = 2;
  Monitor monitor = 3;
}

message UpdateMonitorResponse {
  Monitor monitor = 1;
}

message DeleteMonitorRequest {
  string server_id = 1;
  string monitor_id = 2;
}

message DeleteMonitorResponse {}

message ListCheckResultsRequest {
  string server_id = 1;
  string monitor_id = 2;
  uint32 page_size = 3;
  string page_token = 4;
  google.protobuf.Timestamp start_time = 5;
  google.protobuf.Timestamp end_time = 6;
}

message ListCheckResultsResponse {
  repeated CheckResult results = 1;
  string next_page_token = 2;
}

message GetMonitorUptimeRequest {
  string server_id = 1;
  string monitor_id = 2;
}

message GetMonitorUptimeResponse {
  MonitorUptime uptime = 1;
}

// MonitorService manages monitors attached to a server and exposes
// historical check results and uptime.
service MonitorService {
  rpc ListMonitors(ListMonitorsRequest) returns (ListMonitorsResponse) {}
  rpc CreateMonitor(CreateMonitorRequest) returns (CreateMonitorResponse) {}
  rpc GetMonitor(GetMonitorRequest) returns (GetMonitorResponse) {}
  rpc UpdateMonitor(UpdateMonitorRequest) returns (UpdateMonitorResponse) {}
  rpc DeleteMonitor(DeleteMonitorRequest) returns (DeleteMonitorResponse) {}
  rpc ListCheckResults(ListCheckResultsRequest) returns (ListCheckResultsResponse) {}
  rpc GetMonitorUptime(GetMonitorUptimeRequest) returns (GetMonitorUptimeResponse) {}
}
