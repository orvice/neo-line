syntax = "proto3";

package neoline.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/orvice/neo-line/pkg/proto/neoline/v1;neolinev1";

// Settings holds site-wide presentation configuration for the status page.
message Settings {
  string site_name = 1;
  string status_page_title = 2;
  google.protobuf.Timestamp updated_at = 3;
}

message GetSettingsRequest {}

message GetSettingsResponse {
  Settings settings = 1;
}

message UpdateSettingsRequest {
  Settings settings = 1;
}

message UpdateSettingsResponse {
  Settings settings = 1;
}

// SettingsService manages site-wide presentation settings.
service SettingsService {
  rpc GetSettings(GetSettingsRequest) returns (GetSettingsResponse) {}
  rpc UpdateSettings(UpdateSettingsRequest) returns (UpdateSettingsResponse) {}
}
