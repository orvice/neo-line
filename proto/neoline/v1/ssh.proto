syntax = "proto3";

package neoline.v1;

option go_package = "github.com/orvice/neo-line/pkg/proto/neoline/v1;neolinev1";

message SshServiceExecRequest {
  string server_id = 1;
  string command = 2;
  uint32 timeout_seconds = 3;
}

message SshServiceExecResponse {
  string server_id = 1;
  string host = 2;
  string stdout = 3;
  string stderr = 4;
  int32 exit_code = 5;
}

message SshServiceTestConnectionRequest {
  string server_id = 1;
}

message SshServiceTestConnectionResponse {
  string server_id = 1;
  string host = 2;
  bool ok = 3;
  string output = 4;
}

// SshService executes remote commands against monitored servers that have
// opted in with server.ssh.enabled. The private key comes only from runtime
// configuration and is never stored in MongoDB.
service SshService {
  rpc Exec(SshServiceExecRequest) returns (SshServiceExecResponse) {}
  rpc TestConnection(SshServiceTestConnectionRequest) returns (SshServiceTestConnectionResponse) {}
}
